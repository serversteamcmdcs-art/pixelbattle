<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PIXEL BATTLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d1a;
  --panel: #111127;
  --panel2: #16162e;
  --border: #2a2a5a;
  --accent: #ff4757;
  --accent2: #ffd700;
  --accent3: #00d2ff;
  --text: #e0e0ff;
  --text-dim: #7070aa;
  --pixel: 6px;
  --glow-r: 0 0 12px #ff4757aa;
  --glow-b: 0 0 12px #00d2ffaa;
  --glow-y: 0 0 12px #ffd700aa;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  image-rendering: pixelated;
}

/* scanline effect */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
#app {
  display: grid;
  grid-template-areas:
    "header header header"
    "left   canvas right"
    "bottom bottom bottom";
  grid-template-columns: 220px 1fr 220px;
  grid-template-rows: 56px 1fr 160px;
  width: 100vw; height: 100vh;
  gap: 0;
}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
#header {
  grid-area: header;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px; gap: 16px;
  position: relative;
  overflow: hidden;
}
#header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, #ff475722 0%, transparent 30%, transparent 70%, #00d2ff22 100%);
}
.header-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent);
  text-shadow: var(--glow-r), 2px 2px 0 #000;
  letter-spacing: 2px;
  white-space: nowrap;
}
.header-title span { color: var(--accent2); text-shadow: var(--glow-y), 2px 2px 0 #000; }
.header-stat {
  font-size: 16px;
  color: var(--text-dim);
  white-space: nowrap;
}
.header-stat b { color: var(--accent3); }
.header-spacer { flex: 1; }
#nickname-form {
  display: flex; gap: 6px; align-items: center;
}
#nickname-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  padding: 4px 8px;
  width: 120px;
  outline: none;
}
#nickname-input:focus { border-color: var(--accent3); box-shadow: var(--glow-b); }
.btn-small {
  background: var(--accent);
  border: none; cursor: pointer;
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  padding: 6px 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: background 0.1s, box-shadow 0.1s;
}
.btn-small:hover { background: #ff6b81; box-shadow: var(--glow-r); }

/* ═══════════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════════ */
#left-panel {
  grid-area: left;
  background: var(--panel);
  border-right: 2px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: var(--accent2);
  text-shadow: var(--glow-y);
  padding: 10px 12px 6px;
  border-bottom: 1px solid var(--border);
  letter-spacing: 1px;
}
/* Color Palette */
#palette {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  padding: 10px;
}
.color-swatch {
  aspect-ratio: 1;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
  image-rendering: pixelated;
}
.color-swatch:hover { transform: scale(1.2); z-index: 2; }
.color-swatch.active {
  border-color: #fff;
  box-shadow: 0 0 8px rgba(255,255,255,0.6);
  transform: scale(1.15);
}
/* Custom color */
#custom-color-row {
  display: flex; align-items: center; gap: 6px;
  padding: 0 10px 10px;
}
#custom-color-input {
  width: 36px; height: 36px;
  border: 2px solid var(--border);
  cursor: pointer;
  background: none;
  padding: 0;
}
#custom-color-label { font-size: 14px; color: var(--text-dim); }

/* Current color preview */
#current-color-section {
  margin: 0 10px;
  padding: 8px;
  border: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
#current-color-preview {
  width: 28px; height: 28px;
  border: 2px solid #fff3;
  flex-shrink: 0;
}
#current-color-hex { font-size: 18px; color: var(--accent3); }

/* Zoom controls */
#zoom-section { padding: 10px; border-top: 1px solid var(--border); margin-top: auto; }
.zoom-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-dim); margin-bottom: 6px; }
.zoom-controls { display: flex; gap: 4px; align-items: center; }
.zoom-btn {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 22px;
  width: 32px; height: 32px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.zoom-btn:hover { background: var(--border); }
#zoom-display { flex: 1; text-align: center; font-size: 18px; color: var(--accent3); }

/* Tools */
#tools-section { padding: 10px; border-top: 1px solid var(--border); }
.tool-btn {
  width: 100%; padding: 6px; margin-bottom: 4px;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  cursor: pointer; text-align: left;
  transition: background 0.1s, border-color 0.1s;
}
.tool-btn:hover { background: var(--border); border-color: var(--accent3); }
.tool-btn.active { background: var(--accent3)22; border-color: var(--accent3); color: var(--accent3); }

/* ═══════════════════════════════════════════════════
   CANVAS AREA
═══════════════════════════════════════════════════ */
#canvas-area {
  grid-area: canvas;
  position: relative;
  overflow: hidden;
  background: #0a0a18;
  cursor: crosshair;
  touch-action: none;
}
#canvas-area.panning { cursor: grab; }
#canvas-area.panning:active { cursor: grabbing; }

#pixel-canvas {
  position: absolute;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  transform-origin: 0 0;
}

/* Grid overlay (shown at high zoom) */
#grid-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}

/* Hover indicator */
#hover-pixel {
  position: absolute;
  pointer-events: none;
  border: 2px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
  z-index: 10;
  display: none;
}

/* Coordinates display */
#coords-display {
  position: absolute;
  bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  padding: 4px 8px;
  font-size: 14px;
  color: var(--accent3);
  pointer-events: none;
  z-index: 20;
}

/* Cooldown overlay */
#cooldown-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: var(--accent);
  transform-origin: left;
  transform: scaleX(0);
  transition: transform linear;
  z-index: 20;
  box-shadow: var(--glow-r);
}

/* Flash effect */
#flash {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0;
  background: rgba(255,255,255,0.15);
  z-index: 15;
}

/* ═══════════════════════════════════════════════════
   RIGHT PANEL
═══════════════════════════════════════════════════ */
#right-panel {
  grid-area: right;
  background: var(--panel);
  border-left: 2px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#leaderboard-list {
  flex: 1; overflow-y: auto;
  padding: 6px;
  display: flex; flex-direction: column; gap: 3px;
}
#leaderboard-list::-webkit-scrollbar { width: 4px; }
#leaderboard-list::-webkit-scrollbar-track { background: var(--bg); }
#leaderboard-list::-webkit-scrollbar-thumb { background: var(--border); }

.lb-entry {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px;
  background: var(--panel2);
  border-left: 3px solid transparent;
  font-size: 15px;
  transition: background 0.2s;
}
.lb-entry.me { background: rgba(255, 215, 0, 0.1); border-left-color: var(--accent2); }
.lb-dot {
  width: 10px; height: 10px;
  flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.3);
}
.lb-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-count { color: var(--accent3); font-size: 14px; white-space: nowrap; }
.lb-rank { color: var(--text-dim); font-size: 13px; width: 18px; }

/* Stats section */
#stats-section {
  border-top: 1px solid var(--border);
  padding: 8px;
}
#stats-section .panel-title { padding: 0 0 6px; border: none; }
.stat-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 2px; }
.stat-row .stat-val { color: var(--accent3); }

/* ═══════════════════════════════════════════════════
   BOTTOM PANEL (CHAT)
═══════════════════════════════════════════════════ */
#bottom-panel {
  grid-area: bottom;
  background: var(--panel);
  border-top: 2px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#chat-messages {
  flex: 1; overflow-y: auto;
  padding: 4px 8px;
  display: flex; flex-direction: column; gap: 2px;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-track { background: var(--bg); }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
.chat-msg {
  font-size: 16px;
  line-height: 1.3;
  animation: fadeInUp 0.2s ease;
}
.chat-msg .chat-nick { font-weight: bold; }
.chat-msg .chat-text { color: var(--text); }
.chat-msg.system { color: var(--text-dim); font-style: italic; }
.chat-msg .chat-pixel-info { color: var(--text-dim); font-size: 14px; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

#chat-input-row {
  display: flex; gap: 6px; padding: 6px 8px;
  border-top: 1px solid var(--border);
}
#chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  padding: 4px 8px;
  outline: none;
}
#chat-input:focus { border-color: var(--accent3); }
#chat-send {
  background: var(--accent3);
  border: none; cursor: pointer;
  color: #000;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  padding: 6px 10px;
}
#chat-send:hover { background: #33e0ff; }

/* ═══════════════════════════════════════════════════
   CONNECTION STATUS
═══════════════════════════════════════════════════ */
#conn-status {
  position: fixed;
  top: 60px; right: 8px;
  background: rgba(0,0,0,0.8);
  border: 1px solid var(--border);
  padding: 4px 10px;
  font-size: 14px;
  z-index: 100;
  display: none;
}
#conn-status.show { display: block; }
#conn-status.connecting { color: var(--accent2); border-color: var(--accent2); }
#conn-status.disconnected { color: var(--accent); border-color: var(--accent); }
#conn-status.reconnecting { color: var(--accent2); border-color: var(--accent2); }

/* ═══════════════════════════════════════════════════
   MOBILE LAYOUT
═══════════════════════════════════════════════════ */
@media (max-width: 768px) {
  #app {
    grid-template-areas:
      "header"
      "canvas"
      "toolbar"
      "bottom";
    grid-template-columns: 1fr;
    grid-template-rows: 48px 1fr 80px 140px;
  }
  #left-panel, #right-panel { display: none; }
  
  /* Mobile toolbar */
  #mobile-toolbar {
    grid-area: toolbar;
    background: var(--panel);
    border-top: 2px solid var(--border);
    display: flex !important;
    align-items: center;
    padding: 6px 8px;
    gap: 6px;
    overflow-x: auto;
  }
  #mobile-toolbar::-webkit-scrollbar { display: none; }
  
  .m-swatch {
    width: 32px; height: 32px;
    flex-shrink: 0;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .m-swatch.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.7); }
  
  .m-divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }
  
  .m-btn {
    flex-shrink: 0;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
  }
  .m-btn.active { border-color: var(--accent3); color: var(--accent3); }
  
  #mobile-custom {
    width: 32px; height: 32px;
    flex-shrink: 0;
    border: 2px solid var(--border);
    cursor: pointer;
    padding: 0;
  }
  
  .header-title { font-size: 9px; }
  #nickname-form input { width: 80px; }
  
  #bottom-panel {
    grid-area: bottom;
  }
  
  #coords-display { font-size: 12px; }
}

@media (min-width: 769px) {
  #mobile-toolbar { display: none; }
}

/* ═══════════════════════════════════════════════════
   PIXEL EFFECTS
═══════════════════════════════════════════════════ */
.pixel-sparkle {
  position: absolute;
  pointer-events: none;
  width: 4px; height: 4px;
  background: #fff;
  z-index: 30;
  animation: sparkle 0.4s ease-out forwards;
}
@keyframes sparkle {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(3) translateY(-8px); }
}

/* Retro blinking cursor in title */
@keyframes blink { 50% { opacity: 0; } }
.blink { animation: blink 1s step-end infinite; }

/* Loading screen */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 1000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
}
#loading .load-title {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(12px, 3vw, 24px);
  color: var(--accent);
  text-shadow: var(--glow-r), 4px 4px 0 #000;
  text-align: center;
}
#loading .load-title span { color: var(--accent2); text-shadow: var(--glow-y), 4px 4px 0 #000; }
.load-bar-outer {
  width: 200px; height: 16px;
  border: 2px solid var(--border);
  background: var(--panel);
}
.load-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0%;
  animation: loadprogress 1.5s ease-out forwards;
  box-shadow: var(--glow-r);
}
@keyframes loadprogress { to { width: 100%; } }
.load-text { font-size: 16px; color: var(--text-dim); }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="load-title">PIXEL<br><span>BATTLE</span></div>
  <div class="load-bar-outer"><div class="load-bar-inner"></div></div>
  <div class="load-text">CONNECTING TO SERVER<span class="blink">_</span></div>
</div>

<!-- Main App -->
<div id="app" style="display:none">

  <!-- HEADER -->
  <div id="header">
    <div class="header-title">PIXEL<span>BATTLE</span></div>
    <div class="header-stat">🟢 <b id="online-count">0</b> ONLINE</div>
    <div class="header-stat" id="my-pixels-stat">YOU: <b>0</b> PX</div>
    <div class="header-spacer"></div>
    <div id="nickname-form">
      <input id="nickname-input" type="text" placeholder="NAME" maxlength="20" autocomplete="off">
      <button class="btn-small" onclick="setNickname()">SET</button>
    </div>
  </div>

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-title">🎨 PALETTE</div>
    <div id="palette"></div>
    <div id="custom-color-row">
      <input type="color" id="custom-color-input" value="#ffffff">
      <span id="custom-color-label">Custom color</span>
    </div>
    <div id="current-color-section">
      <div id="current-color-preview"></div>
      <div id="current-color-hex">#FF4757</div>
    </div>

    <div id="tools-section">
      <div class="panel-title" style="padding:0 0 6px;border:none;">🛠 TOOLS</div>
      <button class="tool-btn active" id="tool-draw" onclick="setTool('draw')">✏️ DRAW</button>
      <button class="tool-btn" id="tool-pan" onclick="setTool('pan')">✋ PAN</button>
      <button class="tool-btn" id="tool-pick" onclick="setTool('pick')">💉 PICK COLOR</button>
    </div>

    <div id="zoom-section">
      <div class="zoom-label">ZOOM</div>
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="changeZoom(-1)">−</button>
        <div id="zoom-display">6x</div>
        <button class="zoom-btn" onclick="changeZoom(1)">+</button>
        <button class="zoom-btn" onclick="resetView()" title="Reset">⌂</button>
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-area">
    <canvas id="pixel-canvas"></canvas>
    <canvas id="grid-overlay"></canvas>
    <div id="hover-pixel"></div>
    <div id="coords-display">X:0 Y:0</div>
    <div id="cooldown-bar"></div>
    <div id="flash"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="panel-title">🏆 LEADERBOARD</div>
    <div id="leaderboard-list"></div>
    <div id="stats-section">
      <div class="panel-title">📊 STATS</div>
      <div class="stat-row"><span>Total pixels</span><span class="stat-val" id="stat-total">0</span></div>
      <div class="stat-row"><span>Canvas fill</span><span class="stat-val" id="stat-fill">0%</span></div>
    </div>
  </div>

  <!-- MOBILE TOOLBAR -->
  <div id="mobile-toolbar" style="display:none"></div>

  <!-- BOTTOM (CHAT) -->
  <div id="bottom-panel">
    <div class="panel-title" style="padding:6px 12px 4px">💬 CHAT</div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Type message..." maxlength="100" autocomplete="off">
      <button id="chat-send" onclick="sendChat()">SEND</button>
    </div>
  </div>
</div>

<div id="conn-status" class="connecting show">CONNECTING...</div>

<script>
// ═══════════════════════════════════════════════════
//  PALETTE
// ═══════════════════════════════════════════════════
const PALETTE = [
  '#FFFFFF','#C0C0C0','#808080','#404040','#000000',
  '#FF4757','#FF6B81','#FF0000','#C0392B','#6B0000',
  '#FF8C00','#FFA502','#FFD700','#F1C40F','#7D6608',
  '#2ECC71','#00D2FF','#27AE60','#1ABC9C','#0E6251',
  '#3498DB','#2980B9','#1E90FF','#0000CD','#00008B',
  '#9B59B6','#8E44AD','#6C3483','#E91E63','#AD1457',
  '#795548','#A0522D','#FF7043','#BCAAA4','#4E342E',
  '#00BCD4','#00ACC1','#80DEEA','#B2EBF2','#E0F7FA',
  '#CDDC39','#AFB42B','#827717','#F9A825','#FF6F00',
  '#FF1744','#D50000','#AA00FF','#6200EA','#304FFE',
];

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let ws = null;
let playerId = null;
let myColor = '#FF4757';
let myNickname = 'Player';
let myPixels = 0;
let selectedColor = '#FF4757';
let activeTool = 'draw'; // draw | pan | pick
let cooldownEnd = 0;
let cooldownTimer = null;
let canvasData = null;
let CANVAS_W = 100, CANVAS_H = 100;

// Viewport
let viewX = 0, viewY = 0;
let zoom = 6;
const MIN_ZOOM = 2, MAX_ZOOM = 32;

// Interaction
let isPainting = false;
let isPanning = false;
let panStartX = 0, panStartY = 0, panViewX = 0, panViewY = 0;
let lastHoverX = -1, lastHoverY = -1;

// Touch
let lastTouchDist = null;
let touchPanStart = null;

const canvas = document.getElementById('pixel-canvas');
const ctx = canvas.getContext('2d');
const gridCanvas = document.getElementById('grid-overlay');
const gridCtx = gridCanvas.getContext('2d');

// ═══════════════════════════════════════════════════
//  PALETTE INIT
// ═══════════════════════════════════════════════════
function initPalette() {
  const container = document.getElementById('palette');
  container.innerHTML = '';
  PALETTE.forEach(color => {
    const s = document.createElement('div');
    s.className = 'color
